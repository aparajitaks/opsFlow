name: opsFlow CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      ML_N_JOBS: "1"
      GROQ_API_KEY: ""          # tests use mocks; no secret required
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Task 3 — dataset & feature encoding
        run: |
          python -c "
          import pandas as pd
          from models.train import load_dataset
          from models.features import engineer_features
          df = load_dataset()
          assert len(df) == 10000
          eng = engineer_features(df)
          assert pd.api.types.is_integer_dtype(eng['Type']), eng['Type'].dtype
          print('Task 3 dataset OK')
          "

      - name: Task 4 — RAG imports (no model download)
        run: |
          python -c "from rag.pipeline import RAGPipeline; from rag.chunking import chunk_documents; print('RAG imports OK')"

      - name: Run tests
        run: pytest tests/ -v --tb=short -q

      - name: Task 3 — committed model artifacts
        run: |
          test -f models/artifacts/random_forest_pipeline.pkl
          test -f models/artifacts/logistic_regression_pipeline.pkl
          test -f models/artifacts/evaluation_summary.json
          python -c "import json; s=json.load(open('models/artifacts/evaluation_summary.json')); assert 'random_forest_balanced' in s; print('evaluation_summary OK')"
