name: opsFlow CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import sanity
        run: python -c "from models.train import load_dataset; from rag.pipeline import rag_pipeline; print('OK')"

      - name: Run tests
        env:
          ML_N_JOBS: "1"
          GROQ_API_KEY: ""
        run: pytest tests/ -v --tb=short -q

      - name: Dataset validation smoke
        run: python -c "from models.train import load_dataset; df=load_dataset(); print('rows', len(df))"
